name: Execute atari.py

on:
  push:
    branches:
      - main
    paths:
      - "atari.py"
      - "requirements.txt"
  pull_request:
    branches:
      - main
    paths:
      - "atari.py"
      - "requirements.txt"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        run: ruff check atari.py --ignore=E501,W605

  run:
    runs-on: ubuntu-latest
    needs: lint
    if: always() && (needs.lint.result == 'success' || needs.lint.result == 'failure')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python Setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          pip install pygame
          pip install numpy || true

      - name: Run game test
        env:
          PYGAME_HIDE_SUPPORT_PROMPT: 1
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: |
          xvfb-run -a python -c "
import sys
try:
    import atari
    print('Game loaded successfully')
except Exception as e:
    print(f'Import error: {e}')
    sys.exit(0)
"
