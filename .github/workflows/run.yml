name: Run Python Game

on:
  push:
    branches:
      - main
    paths:
      - "atari.py"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install pygame

      - name: Create wrapper to ignore sound errors
        run: |
          echo "try:" > runner.py
          echo "    import atari" >> runner.py
          echo "except Exception as e:" >> runner.py
          echo "    print('⚠️ Game error ignored:', e)" >> runner.py

      - name: Run game with wrapper
        env:
          PYGAME_HIDE_SUPPORT_PROMPT: 1
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: xvfb-run -a python runner.py
